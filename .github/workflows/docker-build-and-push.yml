name: Build & push e2e docker image

permissions:
  contents: read
  packages: write
  actions: read
  id-token: none

on:
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t neptune-tests:latest ./docker
          docker tag neptune-tests:latest ghcr.io/${{ github.repository }}/neptune-tests:latest
          docker push ghcr.io/${{ github.repository }}/neptune-tests:latest
